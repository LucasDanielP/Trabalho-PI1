services:
  db:
    image: postgres:16-alpine
    container_name: work-and-rest-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workandrest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workandrest}
      POSTGRES_DB: ${POSTGRES_DB:-workandrest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-workandrest} -d ${POSTGRES_DB:-workandrest}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
